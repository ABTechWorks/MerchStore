<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RICH DROPOUT</title>

<link rel="icon" href="logo.png">

<style>

@import url('https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap');

body{
background:rgb(255, 255, 255);
color:rgb(0, 0, 0);
font-family:'Kosugi Maru',sans-serif;
text-align:center;
margin:0;
padding:0;
}

.header{
margin-top:30px;
top:20px;
left:20px;
font-size:14px;
text-align:center;
}

.logo{
margin-top:20px;
width:220px;
}

.product{
margin-top:20px;
}

.product img{
width:380px;
}

.price{
font-size:22px;
margin:10px 0;
}

button{
background:rgb(0, 0, 0);
color:rgb(255, 255, 255);
border:none;
padding:15px 35px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.footer{
position:absolute;
bottom:20px;
width:100%;
font-size:12px;
}

</style>
</head>

<body>

<div class="header">
<div id="date"></div>
<div id="time"></div>
<div id="weather">Loading weather...</div>
</div>

<img src="Public/logo.png" class="logo">

<div class="product">

<img src="Public/shirt.png">

<h2>THE $1000 T SHIRT</h2>

<button onclick="buy()">BUY</button>

</div>

<div class="footer">
RICH DROPOUT
</div>

<script>

function updateClock(){
const now=new Date();

document.getElementById("time").innerText=
now.toLocaleTimeString();

document.getElementById("date").innerText=
now.toDateString();
}

setInterval(updateClock,1000);
updateClock();


async function getWeather(){

try{

const res=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=40.73&longitude=-73.93&current_weather=true"
);

const data=await res.json();

document.getElementById("weather").innerText=
"NYC "+data.current_weather.temperature+"°C";

}catch{

document.getElementById("weather").innerText="Weather unavailable";

}

}

getWeather();


async function buy(){

const res=await fetch('/checkout',{method:'POST'});
const data=await res.json();

window.location=data.url;

}

</script>

</body>
</html>
