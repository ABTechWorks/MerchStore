<script>

function updateClock(){

async function getWeather(){

try{

const res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=40.73&longitude=-73.93&current_weather=true")

let c=data.current_weather.temperature
let f=Math.round((c*9/5)+32)

document.getElementById("weather").innerText="NYC ☀️ "+f+"°F"

}catch{

}
